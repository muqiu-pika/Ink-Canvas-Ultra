name: .NET Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    # 安装 .NET Core
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '6.0.x'
        
    # 安装 NuGet
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v3.0.0
      with:
        nuget-version: '5.x'

    # 还原 NuGet 包
    - name: NuGet restore
      run: nuget restore
      
    # 添加 MSBuild.exe 到环境变量: https://github.com/microsoft/setup-msbuild
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3.0.0

    # 编译整个项目
    - name: Build the solution
      run: |
        msbuild -t:restore /p:GitFlow="Github Action"
        msbuild -target:"Ink Canvas" /p:Configuration=Release /p:Platform="Any CPU" /p:GitFlow="Github Action"
        
    # 创建视频展台快捷方式
    # 使用 pwsh (PowerShell 7) 以 UTF-8 读取脚本，避免 Windows PowerShell 5.1 将中文文件名解析成乱码
    # 传入输出目录和 exe 路径，因为 PostBuild 事件在 CI=true 时不执行
    - name: Create Video Presenter Shortcut
      run: |
        $outputDir = Join-Path $env:GITHUB_WORKSPACE "Ink Canvas\bin\Release"
        $exePath = Join-Path $outputDir "Ink Canvas Ultra.exe"
        & pwsh -ExecutionPolicy Bypass -File Create-Shortcut.ps1 -OutputDir "$outputDir" -ExePath "$exePath"
        
    # 提取版本号
    - name: Extract version
      id: version
      run: |
        $csproj = "Ink Canvas\Ink Canvas.csproj"
        [xml]$project = Get-Content $csproj
        # csproj 中存在多个 PropertyGroup，.ApplicationVersion 返回数组，
        # 只有一个 PropertyGroup 包含 ApplicationVersion，其余为 $null，
        # 取第一个非空值，避免数组转字符串时出现多余空格
        $appVersion = ($project.Project.PropertyGroup.ApplicationVersion | Where-Object { $_ } | Select-Object -First 1)
        $version = ($appVersion -replace '\.%\w+$', '').Trim()
        Write-Output "Extracted version: $version"
        "version=$version" >> $env:GITHUB_OUTPUT

    # 上传编译成品
    - name: Upload to artifact
      uses: actions/upload-artifact@v7
      with:
        name: Ink.Canvas.Ultra.V.${{ steps.version.outputs.version }}
        path: Ink Canvas/bin/Release