name: .NET Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    # 安装 .NET Core
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '6.0.x'
        
    # 安装 NuGet
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v3.0.0
      with:
        nuget-version: '5.x'

    # 还原 NuGet 包
    - name: NuGet restore
      run: nuget restore
      
    # 添加 MSBuild.exe 到环境变量: https://github.com/microsoft/setup-msbuild
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3.0.0

    # 编译整个项目
    - name: Build the solution
      run: |
        msbuild -t:restore /p:GitFlow="Github Action"
        msbuild -target:"Ink Canvas" /p:Configuration=Release /p:Platform="Any CPU" /p:GitFlow="Github Action"
        
    # 创建视频展台快捷方式
    - name: Create Video Presenter Shortcut
      run: |
        powershell -ExecutionPolicy Bypass -File Create-Shortcut.ps1
        
    # 上传编译成品
    - name: Upload to artifact
      uses: actions/upload-artifact@v7
      with:
        name: Ink Canvas Ultra
        path: Ink Canvas/bin/Release